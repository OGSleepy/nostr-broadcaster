<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BROADCAST — Nostr Note Blaster</title>
<meta property="og:title" content="BROADCAST — Nostr Note Blaster" />
<meta property="og:description" content="Rebroadcast any profile's notes across 23 relays, including blast relays that propagate events further into the network. One HTML file. No setup." />
<meta property="og:image" content="https://nostr-broadcaster.pages.dev/og-image.png" />
<meta property="og:url" content="https://nostr-broadcaster.pages.dev" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="BROADCAST — Nostr Note Blaster" />
<meta name="twitter:description" content="Rebroadcast any profile's notes across 23 relays. One HTML file. No setup." />
<meta name="twitter:image" content="https://nostr-broadcaster.pages.dev/og-image.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg:        #080b10;
    --surface:   #0d1117;
    --panel:     #111820;
    --border:    #1e2d3d;
    --accent:    #00c2ff;
    --accent2:   #7b2fff;
    --hot:       #ff3c6f;
    --text:      #d4e4f0;
    --muted:     #4a6477;
    --success:   #00e5a0;
    --warn:      #ffb800;
    --radius:    6px;
    --font-ui:   'Space Grotesk', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    padding: 0 0 80px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .logo-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: conic-gradient(var(--accent), var(--accent2), var(--hot), var(--accent));
    animation: spin 6s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  header h1 {
    font-family: var(--font-mono);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
  }
  header h1 span { color: var(--muted); }

  .status-bar {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.live { background: var(--success); box-shadow: 0 0 8px var(--success); }

  /* ── MAIN ── */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .card-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  /* ── INPUTS ── */
  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.82rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,194,255,0.12);
  }
  input::placeholder { color: var(--muted); }

  /* ── SCOPE PICKER ── */
  .scope-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  @media (max-width: 480px) {
    .scope-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .scope-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    padding: 9px 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    user-select: none;
  }
  .scope-btn:hover { border-color: var(--accent); color: var(--text); }
  .scope-btn.active {
    background: rgba(0,194,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* MODE TOGGLE */
  .mode-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .mode-tab {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .mode-tab.active {
    background: rgba(123,47,255,0.15);
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .count-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .count-row input {
    width: 90px;
    text-align: center;
  }
  .count-row label {
    font-size: 0.82rem;
    color: var(--muted);
  }

  /* ── RELAYS ── */
  .relay-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 240px;
    overflow-y: auto;
    margin-bottom: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .relay-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    transition: border-color 0.15s;
  }
  .relay-item:hover { border-color: var(--muted); }
  .relay-item.checked { border-color: rgba(0,229,160,0.35); }

  .relay-item input[type="checkbox"] {
    width: 15px; height: 15px;
    accent-color: var(--success);
    cursor: pointer;
    flex-shrink: 0;
  }

  .relay-url {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .relay-badge {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .relay-badge.blast {
    background: rgba(255,60,111,0.15);
    color: var(--hot);
    border: 1px solid rgba(255,60,111,0.3);
  }
  .relay-badge.standard {
    background: rgba(0,194,255,0.08);
    color: var(--accent);
    border: 1px solid rgba(0,194,255,0.2);
  }

  .relay-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0 2px;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .relay-remove:hover { color: var(--hot); }

  .add-relay-row {
    display: flex;
    gap: 8px;
  }
  .add-relay-row input { flex: 1; }

  .btn-sm {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    padding: 10px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  .relay-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  /* ── BROADCAST BUTTON ── */
  .broadcast-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--accent2), var(--hot));
    color: #fff;
    font-family: var(--font-mono);
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .broadcast-btn:hover { opacity: 0.92; }
  .broadcast-btn:active { transform: scale(0.99); }
  .broadcast-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .broadcast-btn .btn-glow {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
    pointer-events: none;
  }

  /* ── LOG ── */
  .log-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }

  .log-title {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .log-clear {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.65rem;
    cursor: pointer;
    transition: color 0.15s;
  }
  .log-clear:hover { color: var(--hot); }

  .log-body {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    padding: 12px 16px;
    max-height: 280px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .log-line {
    display: flex;
    gap: 10px;
    align-items: baseline;
    animation: fadein 0.2s ease;
  }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .log-time { color: var(--muted); flex-shrink: 0; font-size: 0.65rem; }
  .log-msg { flex: 1; word-break: break-all; }
  .log-msg.ok { color: var(--success); }
  .log-msg.err { color: var(--hot); }
  .log-msg.info { color: var(--accent); }
  .log-msg.warn { color: var(--warn); }

  /* ── PROGRESS ── */
  .progress-bar-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    height: 4px;
    overflow: hidden;
    display: none;
  }
  .progress-bar-wrap.visible { display: block; }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s;
  }

  /* ── SUMMARY ── */
  .summary {
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 4px;
  }
  .summary.visible { display: grid; }
  .summary-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }
  .summary-num {
    font-family: var(--font-mono);
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .summary-num.ok { color: var(--success); }
  .summary-num.err { color: var(--hot); }
  .summary-num.total { color: var(--accent); }
  .summary-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo-icon"></div>
  <h1>BROAD<span>CAST</span></h1>
  <nav style="margin-left:auto;display:flex;align-items:center;gap:20px">
    <a href="checker.html" style="font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.15s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Coverage Checker →</a>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText" style="font-family:var(--font-mono);font-size:0.7rem;color:var(--muted)">idle</span>
    </div>
  </nav>
</header>

<main>

  <!-- NPUB INPUT -->
  <div class="card">
    <div class="card-label">01 — Target Profile</div>
    <input type="text" id="npubInput" placeholder="npub1... or hex pubkey" spellcheck="false" autocomplete="off" />
  </div>

  <!-- SCOPE -->
  <div class="card">
    <div class="card-label">02 — Scope</div>
    <div class="mode-row">
      <div class="mode-tab active" id="modeTime" onclick="setMode('time')">By Time</div>
      <div class="mode-tab" id="modeCount" onclick="setMode('count')">By Count</div>
    </div>

    <div id="timePicker">
      <div class="scope-grid">
        <div class="scope-btn active" data-val="today" onclick="setScope(this)">Today</div>
        <div class="scope-btn" data-val="week" onclick="setScope(this)">This Week</div>
        <div class="scope-btn" data-val="month" onclick="setScope(this)">This Month</div>
        <div class="scope-btn" data-val="3mo" onclick="setScope(this)">3 Months</div>
        <div class="scope-btn" data-val="6mo" onclick="setScope(this)">6 Months</div>
        <div class="scope-btn" data-val="1yr" onclick="setScope(this)">1 Year</div>
        <div class="scope-btn" data-val="alltime" onclick="setScope(this)" style="grid-column: span 2">All Time</div>
      </div>
    </div>

    <div id="countPicker" style="display:none">
      <div class="count-row">
        <input type="number" id="countInput" value="50" min="1" max="5000" />
        <label>most recent notes</label>
      </div>
    </div>
  </div>

  <!-- RELAYS -->
  <div class="card">
    <div class="card-label">03 — Relay List <span style="color:var(--muted);font-size:0.6rem;margin-left:6px" id="checkedCount"></span></div>

    <div class="relay-controls">
      <button class="btn-sm" onclick="checkAll(true)">Select All</button>
      <button class="btn-sm" onclick="checkAll(false)">Deselect All</button>
      <button class="btn-sm" onclick="checkBlast(true)">Select Blasters Only</button>
    </div>

    <div class="relay-list" id="relayList"></div>

    <div class="add-relay-row">
      <input type="text" id="customRelay" placeholder="wss://relay.example.com" spellcheck="false" />
      <button class="btn-sm" onclick="addCustomRelay()">+ Add</button>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- SUMMARY -->
  <div class="summary" id="summary">
    <div class="summary-box">
      <div class="summary-num total" id="sumTotal">0</div>
      <div class="summary-label">Notes Found</div>
    </div>
    <div class="summary-box">
      <div class="summary-num ok" id="sumOk">0</div>
      <div class="summary-label">Sent OK</div>
    </div>
    <div class="summary-box">
      <div class="summary-num err" id="sumErr">0</div>
      <div class="summary-label">Failed</div>
    </div>
  </div>

  <!-- BROADCAST -->
  <button class="broadcast-btn" id="broadcastBtn" onclick="startBroadcast()">
    <div class="btn-glow"></div>
    ⚡ Broadcast Notes
  </button>

  <!-- LOG -->
  <div class="log-wrap">
    <div class="log-header">
      <span class="log-title">Activity Log</span>
      <button class="log-clear" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-line"><span class="log-time">--:--:--</span><span class="log-msg info">Ready. Paste an npub and configure scope.</span></div>
    </div>
  </div>

</main>

<!-- nostr-tools official browser bundle (unpkg, no module import needed) -->
<script src="https://unpkg.com/nostr-tools/lib/nostr.bundle.js"></script>
<script>
// ───────────────────────────────────────────────
//  DEFAULT RELAY LIST
//  BLAST relays = auto-forward to many other relays
// ───────────────────────────────────────────────
const DEFAULT_RELAYS = [
  // ── BLASTER / BROADCAST relays (rebroadcast to the broader network)
  { url: 'wss://nostr.mutinywallet.com',    type: 'blast' },
  { url: 'wss://purplepag.es',              type: 'blast' },
  { url: 'wss://nostr.wine',               type: 'blast' },
  { url: 'wss://relay.nos.social',         type: 'blast' },
  { url: 'wss://nostr21.com',              type: 'blast' },
  { url: 'wss://blastr.f7z.xyz',           type: 'blast' },
  { url: 'wss://nostr-relay.nokotaro.com', type: 'blast' },
  { url: 'wss://nostr.coinfundit.com',     type: 'blast' },
  { url: 'wss://relay.nostr.com.au',       type: 'blast' },
  // ── STANDARD high-coverage relays
  { url: 'wss://relay.damus.io',           type: 'standard' },
  { url: 'wss://nostr.fmt.wiz.biz',        type: 'standard' },
  { url: 'wss://relay.snort.social',       type: 'standard' },
  { url: 'wss://nos.lol',                  type: 'standard' },
  { url: 'wss://relay.current.fyi',        type: 'standard' },
  { url: 'wss://offchain.pub',             type: 'standard' },
  { url: 'wss://nostr.zbd.gg',             type: 'standard' },
  { url: 'wss://relay.primal.net',         type: 'standard' },
  { url: 'wss://nostr.oxtr.dev',           type: 'standard' },
  { url: 'wss://nostr-pub.wellorder.net',  type: 'standard' },
  { url: 'wss://relay.nostr.wirednet.jp',  type: 'standard' },
  { url: 'wss://soloco.nl',                type: 'standard' },
  { url: 'wss://nostr.onsats.org',         type: 'standard' },
];

// Read relays used only for fetching
const READ_RELAYS = [
  'wss://relay.damus.io',
  'wss://relay.primal.net',
  'wss://nos.lol',
  'wss://nostr.fmt.wiz.biz',
  'wss://relay.snort.social',
  'wss://offchain.pub',
  'wss://nostr.oxtr.dev',
];

let userRelays = DEFAULT_RELAYS.map(r => ({ ...r, checked: true }));

// ─── RELAY UI ────────────────────────────────────
function renderRelays() {
  const list = document.getElementById('relayList');
  list.innerHTML = '';
  userRelays.forEach((relay, i) => {
    const div = document.createElement('div');
    div.className = 'relay-item' + (relay.checked ? ' checked' : '');
    div.innerHTML = `
      <input type="checkbox" ${relay.checked ? 'checked' : ''} onchange="toggleRelay(${i}, this.checked)" />
      <span class="relay-url" title="${relay.url}">${relay.url}</span>
      <span class="relay-badge ${relay.type}">${relay.type === 'blast' ? '⚡ blast' : 'relay'}</span>
      <button class="relay-remove" onclick="removeRelay(${i})" title="Remove">✕</button>
    `;
    list.appendChild(div);
  });
  const n = userRelays.filter(r => r.checked).length;
  document.getElementById('checkedCount').textContent = `${n} / ${userRelays.length} selected`;
}

function toggleRelay(i, val) {
  userRelays[i].checked = val;
  renderRelays();
}
function removeRelay(i) {
  userRelays.splice(i, 1);
  renderRelays();
}
function checkAll(val) {
  userRelays.forEach(r => r.checked = val);
  renderRelays();
}
function checkBlast() {
  userRelays.forEach(r => r.checked = r.type === 'blast');
  renderRelays();
}
function addCustomRelay() {
  const inp = document.getElementById('customRelay');
  let val = inp.value.trim();
  if (!val) return;
  if (!val.startsWith('wss://') && !val.startsWith('ws://')) val = 'wss://' + val;
  if (userRelays.find(r => r.url === val)) { log('Already in list: ' + val, 'warn'); return; }
  userRelays.push({ url: val, type: 'standard', checked: true });
  inp.value = '';
  renderRelays();
  log('Added relay: ' + val, 'info');
}

// expose to inline onclick handlers
window.toggleRelay  = toggleRelay;
window.removeRelay  = removeRelay;
window.checkAll     = checkAll;
window.checkBlast   = checkBlast;
window.addCustomRelay = addCustomRelay;

// ─── SCOPE ───────────────────────────────────────
let currentMode  = 'time';
let currentScope = 'today';

function setMode(m) {
  currentMode = m;
  document.getElementById('modeTime').classList.toggle('active', m === 'time');
  document.getElementById('modeCount').classList.toggle('active', m === 'count');
  document.getElementById('timePicker').style.display  = m === 'time'  ? '' : 'none';
  document.getElementById('countPicker').style.display = m === 'count' ? '' : 'none';
}
function setScope(el) {
  document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentScope = el.dataset.val;
}
window.setMode  = setMode;
window.setScope = setScope;

function getSinceTimestamp(scope) {
  const now = Math.floor(Date.now() / 1000);
  const D = 86400, W = 7 * D, M = 30 * D;
  return ({ today: now-D, week: now-W, month: now-M, '3mo': now-3*M,
            '6mo': now-6*M, '1yr': now-365*D, alltime: 0 })[scope] ?? 0;
}

// ─── LOG ─────────────────────────────────────────
function log(msg, type = 'info') {
  const body = document.getElementById('logBody');
  const now  = new Date();
  const ts   = [now.getHours(), now.getMinutes(), now.getSeconds()]
                 .map(n => String(n).padStart(2, '0')).join(':');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${ts}</span><span class="log-msg ${type}">${msg}</span>`;
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
}
function clearLog() { document.getElementById('logBody').innerHTML = ''; }
window.clearLog = clearLog;

// ─── STATUS ──────────────────────────────────────
function setStatus(s, live = false) {
  document.getElementById('statusText').textContent = s;
  document.getElementById('statusDot').className = 'status-dot' + (live ? ' live' : '');
}

// ─── HELPERS ─────────────────────────────────────
// Wraps a promise with a timeout; resolves to `fallback` on timeout
function withTimeout(promise, ms, fallback) {
  return Promise.race([
    promise,
    new Promise(resolve => setTimeout(() => resolve(fallback), ms))
  ]);
}

// Deduplicate events by id
function dedup(arr) {
  const seen = new Set();
  return arr.filter(e => seen.has(e.id) ? false : (seen.add(e.id), true));
}

// ─── BROADCAST ───────────────────────────────────
async function startBroadcast() {
  const nt = window.NostrTools;
  if (!nt) { log('nostr-tools not loaded yet, try again.', 'err'); return; }

  const npubRaw = document.getElementById('npubInput').value.trim();
  if (!npubRaw) { log('Paste an npub or hex pubkey first.', 'err'); return; }

  // Decode npub → hex pubkey
  let pubkey;
  try {
    if (npubRaw.startsWith('npub1')) {
      const dec = nt.nip19.decode(npubRaw);
      if (dec.type !== 'npub') throw new Error('not an npub');
      pubkey = dec.data;
    } else {
      pubkey = npubRaw.toLowerCase();
    }
    if (!/^[0-9a-f]{64}$/.test(pubkey)) throw new Error('not a valid 64-char hex key');
  } catch (e) {
    log('Invalid npub / pubkey: ' + e.message, 'err');
    return;
  }

  const selectedRelays = userRelays.filter(r => r.checked).map(r => r.url);
  if (!selectedRelays.length) { log('Select at least one relay.', 'err'); return; }

  const btn = document.getElementById('broadcastBtn');
  btn.disabled = true;
  setStatus('fetching…', true);
  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('summary').classList.remove('visible');

  // ── Build filter
  const filter = { kinds: [1], authors: [pubkey] };
  if (currentMode === 'time') {
    const since = getSinceTimestamp(currentScope);
    if (since > 0) filter.since = since;
    filter.limit = 2000;
  } else {
    filter.limit = Math.max(1, parseInt(document.getElementById('countInput').value, 10) || 50);
  }

  log(`Fetching notes for ${npubRaw.slice(0, 20)}…`, 'info');

  // ── STEP 1: Fetch using SimplePool.querySync across all read relays
  // querySync(relays, filter) → Promise<Event[]>, resolves after EOSE from all relays
  const pool = new nt.SimplePool();
  let events = [];
  try {
    const raw = await withTimeout(
      pool.querySync(READ_RELAYS, filter, { maxWait: 10000 }),
      14000, // hard outer timeout slightly longer than maxWait
      []
    );
    events = dedup(raw);
    log(`↓ ${events.length} notes fetched across ${READ_RELAYS.length} relays`, 'ok');
  } catch (e) {
    log('Fetch error: ' + (e.message || e), 'err');
  } finally {
    pool.close(READ_RELAYS);
  }

  if (!events.length) {
    log('No notes found. Try a wider time window.', 'err');
    setStatus('idle');
    btn.disabled = false;
    return;
  }

  // Sort newest first, then cap by count if in count mode
  events.sort((a, b) => b.created_at - a.created_at);
  if (currentMode === 'count') events = events.slice(0, filter.limit);

  log(`Broadcasting ${events.length} notes → ${selectedRelays.length} relays…`, 'info');
  document.getElementById('sumTotal').textContent = events.length;

  // ── STEP 2: Publish each event to all selected relays using SimplePool.publish
  // pool.publish(relays, event) returns an array of promises, one per relay
  let sent = 0, failed = 0;
  const pubPool = new nt.SimplePool();
  let done = 0;
  const total = events.length;

  for (const ev of events) {
    // publish returns array of promises (one per relay); we wait for all with individual error catching
    const publishPromises = pubPool.publish(selectedRelays, ev).map(p =>
      withTimeout(
        p.then(() => 'ok').catch(() => 'fail'),
        8000, // 8s per relay publish timeout
        'fail'
      )
    );
    const results = await Promise.all(publishPromises);
    const okCount = results.filter(r => r === 'ok').length;
    sent   += okCount;
    failed += results.length - okCount;

    done++;
    document.getElementById('progressBar').style.width = Math.round(done / total * 100) + '%';

    // Brief yield to keep UI responsive
    await new Promise(r => setTimeout(r, 0));
  }

  pubPool.close(selectedRelays);

  document.getElementById('sumOk').textContent  = sent;
  document.getElementById('sumErr').textContent  = failed;
  document.getElementById('summary').classList.add('visible');
  document.getElementById('progressBar').style.width = '100%';

  log(`Done. ${sent} relay-sends OK, ${failed} failed.`, sent > 0 ? 'ok' : 'err');
  setStatus('done', false);
  btn.disabled = false;
}
window.startBroadcast = startBroadcast;

// ─── INIT ─────────────────────────────────────────
renderRelays();
</script>
</body>
